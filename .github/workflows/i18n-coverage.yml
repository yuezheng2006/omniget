name: i18n Coverage Check

on:
  pull_request:
    paths:
      - 'src/lib/i18n/**'
      - 'scripts/i18n-tracker.cjs'
  push:
    branches:
      - main
    paths:
      - 'src/lib/i18n/**'
      - 'scripts/i18n-tracker.cjs'

jobs:
  check-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Make tracker executable
        run: chmod +x scripts/i18n-tracker.cjs

      # ── 结构完整性：所有 locale 键集合必须与 en.json 一致 ──
      - name: Verify locale key parity
        run: node scripts/generate-i18n-keys.js

      # ── 覆盖率仪表盘 ──
      - name: i18n coverage report
        id: cov
        run: |
          {
            echo "## 🌍 i18n 翻译覆盖率"
            echo ""
            echo "<pre>"
            node scripts/i18n-tracker.cjs status 2>&1
            echo "</pre>"
          } >> $GITHUB_STEP_SUMMARY

      # ── 抽取中文覆盖率数值，用于阈值判断与 PR 评论 ──
      - name: Read zh coverage
        id: zh
        run: |
          node scripts/i18n-tracker.cjs missing zh --format json > zh_missing.json
          ZH_COV=$(node -e "const m=require('./zh_missing.json'); const c=(m.total-m.untranslated)/m.total*100; console.log(c.toFixed(2))")
          echo "coverage=$ZH_COV" >> "$GITHUB_OUTPUT"
          echo "zh coverage: $ZH_COV%"

      # ── 代码使用分析：引用但缺失 = bug ──
      - name: Usage analysis (missing/orphaned keys)
        run: |
          {
            echo "## 🔍 代码使用分析"
            echo ""
            echo "<pre>"
            node scripts/i18n-tracker.cjs usage 2>&1
            echo "</pre>"
          } >> $GITHUB_STEP_SUMMARY

      - name: Check minimum zh coverage
        run: |
          MIN=50
          CUR=${{ steps.zh.outputs.coverage }}
          echo "zh coverage: $CUR% (min: $MIN%)"
          if (( $(echo "$CUR < $MIN" | bc -l) )); then
            echo "::warning::中文覆盖率 $CUR% 低于阈值 $MIN%，请补充翻译。参考 .github/CONTRIBUTING_i18n.md"
          else
            echo "✅ 覆盖率达标"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const cov = '${{ steps.zh.outputs.coverage }}';
            const min = 50;
            const ok = parseFloat(cov) >= min;
            const icon = ok ? '✅' : '⚠️';

            const body = [
              `## ${icon} i18n 覆盖率检查`,
              ``,
              `**中文 (zh): ${cov}%** · 阈值 ${min}%`,
              ok ? `覆盖率达标。` : `覆盖率低于阈值，建议补充翻译。`,
              ``,
              `<details><summary>📋 本地如何跟踪</summary>`,
              ``,
              `- \`pnpm i18n:status\` — 一眼看完所有语言 + 趋势`,
              `- \`pnpm i18n:next\` — 建议接下来翻译什么`,
              `- \`pnpm i18n:usage\` — 找代码里用了但 locale 没有的键（bug）和死键`,
              `- 开发时访问 \`/dev/i18n\` 看应用内实时仪表盘`,
              ``,
              `</details>`
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === "Bot" && c.body.includes("i18n 覆盖率检查"));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body
              });
            }

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-reports
          path: |
            zh_missing.json
          retention-days: 14
